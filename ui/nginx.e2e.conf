# nginx site config for the Tier-3 e2e stack (docker-compose.e2e.yml): serve the
# built SPA and proxy the control-plane REST + WebSocket traffic to the `api`
# container, same-origin — mirroring ui/vite.config.ts's dev proxy so the SPA uses
# same-origin /api/v1 and /ws paths in both dev and e2e.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: any non-asset route serves index.html so client-side
    # routing works on a hard refresh (UI-05 restore-after-refresh path).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST control plane → api:8000 (envelope responses pass through untouched).
    location /api/v1 {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket terminal bridge → api:8000 with the Upgrade handshake. The Origin
    # header is forwarded so the bridge's CSWSH allow-list (BURROW_ALLOWED_ORIGIN)
    # sees the real browser origin.
    location /ws {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        # Terminals are long-lived; don't let nginx time out an idle-but-open WS.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
