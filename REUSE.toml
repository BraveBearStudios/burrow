# REUSE 3.x license declaration for files that CANNOT carry an inline SPDX
# comment header (lockfiles, comment-less JSON config, generated/binary design
# assets). Every source file that CAN hold a comment keeps its own two-line
# inline header in the correct syntax — those are deliberately NOT listed here.
# (CICD-06: a missing inline header on a real source must surface, not be
#  papered over by a blanket glob.)

version = 1

# ── Lockfiles ──────────────────────────────────────────────────────────
[[annotations]]
path = ["api/uv.lock", "ui/package-lock.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Brave Bear Studios"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ── Comment-less JSON config (JSON has no comment syntax) ───────────────
[[annotations]]
path = [
  ".planning/config.json",
  "ui/package.json",
  "ui/tsconfig.json",
  "ui/biome.json",
  "cc-worker-config/plugins/manifest.json",
  "cc-worker-config/plugins/manifest.schema.json",
  "release-please-config.json",
  ".release-please-manifest.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Brave Bear Studios"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ── Design handoff bundle (generated/binary assets from the design tool:
#    screenshots, bundled JS/CSS/HTML, manifests, the zip) ───────────────
[[annotations]]
path = ["design/Burrow-handoff.zip", "design/Burrow-handoff/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Brave Bear Studios"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# ── GSD planning artifacts (CICD-08) ───────────────────────────────────
# Planning artifacts are licensed HERE, not via inline headers. This is the
# reconciled convention: a `*-PLAN.md` must keep its YAML frontmatter on line 1
# so the gsd-sdk `phase-plan-index` parser reads `wave`/`depends_on` (a leading
# SPDX HTML comment makes the parser fall back to wave-1/no-deps). Covering the
# whole `.planning` tree here keeps every PLAN/REVIEW/SUMMARY/etc. compliant
# without an inline header. Real source files (api/, ui/, cc-worker-config/,
# scripts) are deliberately NOT globbed — CICD-06 still requires their inline
# two-line header to surface if missing.
[[annotations]]
path = [
  ".planning/*.md",
  ".planning/**/*.md",
  ".planning/*.json",
  ".planning/**/*.json",
  ".planning/**/.gitignore",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Brave Bear Studios"
SPDX-License-Identifier = "AGPL-3.0-or-later"
