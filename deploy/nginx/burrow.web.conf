#
# burrow-web reverse-proxy config (container deploy).
#
# Mounted over /etc/nginx/nginx.conf in the published burrow-ui image, which by
# itself only serves the SPA (Dockerfile.ui bakes a SPA-only server). This adds
# the same-origin split the control plane needs:
#   /        -> the static SPA (history fallback for client-side routing, UI-05)
#   /api/    -> burrow-api:8000  (REST envelope passes through untouched)
#   /ws      -> burrow-api:8000  (WebSocket terminal bridge, Upgrade handshake)
#
# Full nginx.conf (not a conf.d snippet) because the burrow-ui image's baked
# config does not `include conf.d`. Keeps the image's unprivileged contract:
# nginx runs as USER nginx, so the pid + every temp path live under /tmp.

pid /tmp/nginx.pid;
worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Unprivileged: the nginx user can only write under /tmp.
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path        /tmp/nginx-proxy;
    fastcgi_temp_path      /tmp/nginx-fastcgi;
    uwsgi_temp_path        /tmp/nginx-uwsgi;
    scgi_temp_path         /tmp/nginx-scgi;

    sendfile on;

    # The API service name on the compose network. uvicorn listens 0.0.0.0:8000
    # inside the burrow-api container (Dockerfile.api CMD).
    upstream burrow_api {
        server burrow-api:8000;
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA history fallback: any non-asset route serves index.html so a hard
        # refresh on a client-side route still loads (UI-05 restore-after-refresh).
        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST control plane. No trailing slash on proxy_pass: the full /api/v1/...
        # URI is forwarded verbatim to FastAPI (which serves under /api/v1).
        location /api/ {
            proxy_pass http://burrow_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket terminal bridge. Origin is forwarded so the bridge's CSWSH
        # allow-list (ALLOWED_ORIGIN) sees the real browser origin. Terminals are
        # long-lived, so don't time out an idle-but-open socket.
        location /ws {
            proxy_pass http://burrow_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
