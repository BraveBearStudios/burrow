#
# Burrow release supply-chain (CICD-05). A semver v[0-9]+.[0-9]+.[0-9]+ tag (or a
# published GitHub Release) builds BOTH production images, pushes them to GHCR by
# immutable digest, then for each published image: generates a syft SBOM in SPDX AND
# CycloneDX, signs the image KEYLESS with cosign (Sigstore + GitHub OIDC — no
# long-lived key), and emits a SLSA build-provenance attestation bound to the
# digest. (ci-cd-and-testing.md §5.4/§5.5.)
#
# Release tags are owned by release-please: only a full semver vX.Y.Z tag fires
# this workflow, and operators no longer hand-push two-component v1.x milestone
# tags (a milestone tag would otherwise trigger a spurious sign/attest/publish).
#
# Splits cleanly from ci.yml: ci.yml builds + Trivy-scans on PR WITHOUT pushing
# (CICD-04); this file owns SBOM / sign / provenance / GHCR-publish and runs
# ONLY on a release tag, so fork PRs can never read the publish credentials
# (§5.5). v1 is LAN-only at the running-service layer (Pitfall 12) — this is the
# artifact-publish path to the project's OWN registry, which is fully verifiable.
#
# Third-party actions are SHA-pinned (ci-cd §5.5); the trailing comment records
# the human-readable version the SHA resolves to. The workflow default below is
# the least-privilege contents:read; the publish job adds EXACTLY the four scopes
# keyless signing + provenance + GHCR push need — nothing broader (Pitfall 7).

name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish + sign ${{ matrix.image }}
    runs-on: ubuntu-latest
    # EXACTLY these four — nothing broader (Pitfall 7 / ci-cd §5.5):
    #   contents:     read   — checkout the tagged source
    #   packages:     write  — push the image AND the provenance/SBOM to GHCR
    #   id-token:     write  — OIDC for cosign keyless + attest-build-provenance
    #   attestations: write  — actions/attest-build-provenance writes the attestation
    # A missing scope fails keyless signing with an opaque OIDC error, so the set
    # is pinned here and asserted in 04-VALIDATION.
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: burrow-api
            dockerfile: Dockerfile.api
          - image: burrow-ui
            dockerfile: Dockerfile.ui
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
          # allowlist-prep (ACC-02): stays a COMMENT; egress stays audit.
          # This is the publish path: fulcio/rekor/tuf are the keyless-signing-
          # critical endpoints (a missing one silently breaks cosign). When the
          # block flip happens, populate allowed-endpoints from the first live
          # audit run's Step Security insights:
          # allowed-endpoints: |
          #   fulcio.sigstore.dev:443
          #   rekor.sigstore.dev:443
          #   tuf.sigstore.dev:443
          #   token.actions.githubusercontent.com:443
          #   ghcr.io:443
          #   github.com:443
          #   objects.githubusercontent.com:443
          # Flip procedure (audit -> block) is in 14-ACCEPTANCE.md.

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Authenticate to GHCR with the run's built-in GITHUB_TOKEN — no PAT, no
      # stored credential. The token is scoped to this repository's packages by
      # the packages:write permission above.
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the lowercased ghcr.io/<owner>/<image> base ONCE, then reuse it
      # for the metadata tags, both SBOMs, cosign sign, and the attest subject.
      # docker/metadata-action lowercases only the PUSHED tag; syft/cosign/attest
      # build their own ref, so the raw mixed-case owner (BraveBearStudios)
      # desyncs them from the pushed digest, fails the syft pull, and ships an
      # unsigned partial publish. One base output fixes all five refs uniformly.
      # OWNER comes in via env (not inline) so the shell,
      # not the expansion, does the ${VAR,,} lowercase (runner default shell is
      # bash on ubuntu-latest).
      - name: Compute lowercased GHCR image base
        id: imgref
        env:
          OWNER: ${{ github.repository_owner }}
          IMAGE: ${{ matrix.image }}
        run: echo "base=ghcr.io/${OWNER,,}/${IMAGE}" >> "$GITHUB_OUTPUT"

      # Compute the §2.4 release tags (X.Y.Z, X.Y, latest, sha-<short>) and the
      # OCI source/revision/version labels for the fully-qualified GHCR image.
      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.imgref.outputs.base }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short

      # Build and PUSH by digest. push:true makes steps.build.outputs.digest the
      # immutable manifest digest that every downstream step signs/attests AGAINST
      # — never a floating tag (the tamper-resistant binding, ci-cd §2.4).
      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # syft SBOM #1 — SPDX. Targets the pushed image BY DIGEST so the SBOM binds
      # the exact published artifact (ci-cd §5.4: SPDX + CycloneDX both required).
      - name: SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        env:
          # Give syft explicit ghcr.io auth so it can PULL the pushed-by-digest
          # image for the SBOM. Without it the private-package pull fails and the
          # sign/attest chain aborts. Same GITHUB_TOKEN docker/login-action used.
          SYFT_REGISTRY_AUTH_AUTHORITY: ghcr.io
          SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          SYFT_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image: ${{ steps.imgref.outputs.base }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      # syft SBOM #2 — CycloneDX (a second run; one action invocation emits a
      # single format, so dual-format == two runs).
      - name: SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        env:
          # Second SBOM run needs the same ghcr.io pull auth as the SPDX run
          # (one action invocation emits one format, so dual-format == two runs).
          SYFT_REGISTRY_AUTH_AUTHORITY: ghcr.io
          SYFT_REGISTRY_AUTH_USERNAME: ${{ github.actor }}
          SYFT_REGISTRY_AUTH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image: ${{ steps.imgref.outputs.base }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}.cyclonedx.json

      # Install cosign, then KEYLESS-sign the image BY DIGEST. No --key: the
      # signature uses the run's ephemeral OIDC identity (Fulcio cert recorded in
      # Rekor) — nothing long-lived to leak or rotate (ci-cd §5.4 / T-04-05A).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign --yes \
            "${{ steps.imgref.outputs.base }}@${{ steps.build.outputs.digest }}"

      # SLSA build-provenance attestation, bound to the digest and pushed to the
      # registry alongside the image. subject-name MUST be the fully-qualified
      # GHCR name for push-to-registry to resolve the subject (T-04-05C).
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.imgref.outputs.base }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

# ── Verification runbook (CD / human authority — ci-cd §5.4) ──────────────────
# The structural gate in CI is YAML/actionlint validity + the permission-scope
# and SHA-pin assertions above. The AUTHORITATIVE acceptance is run by a human
# (or release automation) against the PUBLISHED digest, after a real v* tag —
# it needs the live registry + OIDC and is therefore NOT a PR-CI command:
#
# NOTE: the ghcr.io/<owner> REGISTRY path is lowercase (bravebearstudios); the
# github.com identity in --certificate-identity-regexp and the gh attestation
# --owner stay canonical-case (BraveBearStudios). They are GitHub ORG identities,
# not registry paths. Do NOT lowercase them to match: verification would fail.
#
#   # Confirm the keyless cosign signature on the published digest:
#   cosign verify \
#     --certificate-identity-regexp 'https://github.com/BraveBearStudios/burrow/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/bravebearstudios/burrow-api@sha256:<digest>
#
#   # Confirm the SLSA build-provenance attestation on the published digest:
#   gh attestation verify \
#     oci://ghcr.io/bravebearstudios/burrow-api@sha256:<digest> \
#     --owner BraveBearStudios
#
# (Repeat for burrow-ui. Pin deployment configs to the digest, not a floating
# tag — ci-cd §2.4.)
