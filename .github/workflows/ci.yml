#
# Burrow CI — Tier-0 static gates (CICD-01) + Conventional-Commit PR-title
# validation. The test pyramid (unit/integration/e2e) and image build/scan
# jobs land in Phase 1 / Phase 4; this file intentionally ships only the
# always-green-on-commit static gates plus the PR-title check.
#
# Third-party actions are SHA-pinned (ci-cd-and-testing.md §5.5 / §7); the
# trailing comment records the human-readable version the SHA resolves to.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-gates:
    name: Tier-0 static gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # allowlist-prep (ACC-02): stays a COMMENT; egress stays audit.
          # When flipping egress-policy to block, populate allowed-endpoints
          # with the endpoints discovered from the first live audit run's Step
          # Security insights. The cosign/OIDC/GHCR publish path needs:
          # allowed-endpoints: |
          #   fulcio.sigstore.dev:443
          #   rekor.sigstore.dev:443
          #   tuf.sigstore.dev:443
          #   token.actions.githubusercontent.com:443
          #   ghcr.io:443
          #   github.com:443
          #   objects.githubusercontent.com:443
          # Flip procedure (audit -> block) is in 14-ACCEPTANCE.md.

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # ── Workflow schema/expression lint (ACC-02) ───────────────────────
      # actionlint validates the GitHub Actions workflow files themselves
      # (schema, ${{ }} expressions, shell snippets, runner labels). It runs
      # EARLY here so a workflow misconfiguration fails fast, before the
      # slower uv/npm install gates. actionlint is the rhysd/actionlint
      # binary; it is unavailable on the Windows dev box (Phase 8 RELX-02),
      # so this gate's RUN is proven by the live Linux runner only; local
      # verification is structural (parse + SHA-pin). reviewdog/action-actionlint
      # is actionlint's upstream-documented Actions integration; reporter is
      # github-check (works on push and PR) and fail_level error makes it a
      # hard, fail-fast gate (not advisory PR annotations).
      - name: actionlint · workflow schema/expression lint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # ── API gates (api/) ───────────────────────────────────────────────
      - name: api · install (frozen)
        run: uv sync --frozen
        working-directory: api

      - name: api · ruff check
        run: uv run ruff check .
        working-directory: api

      # Boot-harness + manifest-drift tiers (CICD-02/03): a regression in
      # burrow-boot.sh or a manifest schema drift fails the build here, not on
      # the dev-homelab smoke. Hermetic — no real Proxmox (fake control plane +
      # file:// bare repos + stub ttyd on PATH).
      - name: api · pytest (boot + manifest tiers)
        run: uv run pytest tests/boot tests/integration/test_manifest_schema.py -q
        working-directory: api

      # Phase-4 hermetic runtime-hardening tiers (CAP-02/CAP-03): a reconciler
      # (reaper / idle auto-stop), capacity-race, or lifespan regression fails the
      # build HERE rather than only at the dev-homelab smoke. All three run over
      # the Fake provider with an injected clock — no real Proxmox, no real time.
      # (test_capacity_race.py ships with Plan 04-02; test_reconciler.py and
      # test_lifespan.py with Plan 04-01.)
      - name: api · pytest (reconciler + capacity + lifespan tiers)
        run: uv run pytest tests/unit/test_reconciler.py tests/integration/test_capacity_race.py tests/integration/test_lifespan.py -q
        working-directory: api

      - name: api · ruff format --check
        run: uv run ruff format --check .
        working-directory: api

      - name: api · mypy . --strict
        run: uv run mypy . --strict
        working-directory: api

      - name: api · lockfile freshness (uv lock --check)
        run: uv lock --check
        working-directory: api

      # ── UI gates (ui/) ─────────────────────────────────────────────────
      - name: ui · install (frozen, npm ci)
        run: npm ci
        working-directory: ui

      - name: ui · tsc --noEmit
        run: npx tsc --noEmit
        working-directory: ui

      - name: ui · biome ci
        run: npx biome ci .
        working-directory: ui

      # ── Boot-script lint (shellcheck) ──────────────────────────────────
      # shellcheck ships preinstalled on ubuntu-latest, so no third-party
      # action is needed (the repo's SHA-pin convention is preserved). It runs
      # here because it was unavailable on the Windows dev host (Plan 00-06).
      - name: shellcheck · worker boot scripts
        run: shellcheck cc-worker-config/lxc/worker-template/burrow-boot.sh cc-worker-config/lxc/worker-template/provision-template.sh

      # ── Repo-wide SPDX gate (CICD-06) ──────────────────────────────────
      # CICD-07: pin the encoding module. Bare `uvx reuse lint` raises
      # NoEncodingModuleError on hosts without libmagic (the Windows dev box +
      # slim runners); `--with charset-normalizer` supplies a pure-Python encoder.
      - name: spdx · reuse lint
        run: uvx --with charset-normalizer reuse lint

  pr-title:
    name: Conventional-Commit PR title
    runs-on: ubuntu-latest
    # PRs are squash-merged, so the PR title becomes the commit message and
    # must itself be a valid Conventional Commit (CONTRIBUTING.md / ci-cd §3.3).
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # allowlist-prep (ACC-02): stays a COMMENT; egress stays audit.
          # When flipping egress-policy to block, populate allowed-endpoints
          # with the endpoints discovered from the first live audit run's Step
          # Security insights. The cosign/OIDC/GHCR publish path needs:
          # allowed-endpoints: |
          #   fulcio.sigstore.dev:443
          #   rekor.sigstore.dev:443
          #   tuf.sigstore.dev:443
          #   token.actions.githubusercontent.com:443
          #   ghcr.io:443
          #   github.com:443
          #   objects.githubusercontent.com:443
          # Flip procedure (audit -> block) is in 14-ACCEPTANCE.md.

      - name: Validate PR title (semantic / conventional-commit)
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Image build + vulnerability scan (CICD-04) ───────────────────────
  # Builds both production images WITHOUT pushing (PRs prove the image builds;
  # publish is release.yml only — ci-cd §2.4 / Pitfall 12, v1 stays LAN-only),
  # then runs Trivy in the two-run pattern: a gate run that FAILS the build on
  # HIGH/CRITICAL, and a second `if: always()` run that emits a full SARIF for
  # GitHub code scanning. One run cannot do both — the SARIF format ignores the
  # severity-scoped exit-code (aquasecurity/trivy-action#309).
  build-scan:
    name: Build + scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [static-gates]
    permissions:
      contents: read
      security-events: write # github/codeql-action/upload-sarif
      actions: read          # upload-sarif run/workflow metadata (private repos)
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: burrow-api
            dockerfile: Dockerfile.api
          - image: burrow-ui
            dockerfile: Dockerfile.ui
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # allowlist-prep (ACC-02): stays a COMMENT; egress stays audit.
          # When flipping egress-policy to block, populate allowed-endpoints
          # with the endpoints discovered from the first live audit run's Step
          # Security insights. The cosign/OIDC/GHCR publish path needs:
          # allowed-endpoints: |
          #   fulcio.sigstore.dev:443
          #   rekor.sigstore.dev:443
          #   tuf.sigstore.dev:443
          #   token.actions.githubusercontent.com:443
          #   ghcr.io:443
          #   github.com:443
          #   objects.githubusercontent.com:443
          # Flip procedure (audit -> block) is in 14-ACCEPTANCE.md.

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build the image into the local daemon (load: true) so Trivy can scan it.
      # push: false — never publish on PR (ci-cd §2.4).
      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:scan

      # Run 1 — the GATE: fail the build on any HIGH/CRITICAL finding.
      - name: Trivy scan (gate — fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: "false"

      # Run 2 — the full REPORT: emit a complete SARIF regardless of the gate.
      - name: Trivy scan (SARIF — full report)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: sarif
          output: trivy-${{ matrix.image }}.sarif

      - name: Upload Trivy SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
